<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Página</title>

  <style>
    body {
      margin: 0;
      background: white;
      font-family: Arial;
      height: 100vh;
      overflow: hidden;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Contenedor */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* Imagen encabezado */
    .titulo-img {
      width: 70%;
      max-width: 350px;
    }

    /* Imagen principal (🔥 MÁS GRANDE) */
    .dibujo {
      width: 90%;
      max-width: 550px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }

    /* Imagen botón */
    .boton-img {
      width: 180px;
      cursor: pointer;

      opacity: 0;
      transition: opacity 1.5s ease, transform 0.3s ease;

      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .mostrar {
      opacity: 1;
    }

    .boton-img:hover {
      transform: scale(1.08);
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    }

    /* 📱 Celular */
    @media (max-width: 600px) {
      .boton-img {
        width: 150px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- 🖼️ Encabezado -->
    <img src="imagen2.png" class="titulo-img">

    <!-- 🖼️ Imagen principal -->
    <img src="imagen.png" class="dibujo">

    <!-- 🖼️ Imagen botón -->
    <img src="imagen3.png" id="btnImg" class="boton-img">
  </div>

  <script>
    // Mostrar botón después de 5 segundos
    window.addEventListener("load", () => {
      setTimeout(() => {
        const btn = document.getElementById("btnImg");
        if (btn) {
          btn.classList.add("mostrar");
        }
      }, 5000);
    });

    // Acción al hacer clic
    document.getElementById("btnImg").addEventListener("click", () => {
      alert("espero tu respuesta...");
    });
  </script>

</body>
</html>
